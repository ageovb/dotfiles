claude:
  # Claude Code Provider Configuration
  # Docs: https://docs.anthropic.com/zh-CN/docs/claude-code/settings
  #
  # Structure:
  #   - defaults: Global default settings (accounts can override)
  #   - providers: Provider definitions (base_url + available models)
  #   - accounts: Account configurations (model selection + settings)
  #
  # API keys stored in gopass: claude/providers/{provider}/accounts/{base64url(account)}/api_key

  # ===== Global Defaults =====
  # Fallback when neither account nor provider specifies a value.
  defaults:
    timeout_ms: 600000
    disable_nonessential_traffic: false
  # ===== Provider Definitions =====
  # Only base_url and available models list
  providers:
    proxy:
      base_url: http://localhost:8080
      timeout_ms: 300000
      disable_nonessential_traffic: true
      models:
        - claude-opus
        - claude-sonnet
        - gpt
        - gpt-codex
        - gemini-flash
        - gemini-pro
        - glm
        - kimi
        - minimax
        - small
  # ===== Account Configurations =====
  # Format: provider or provider@account
  # Fields: model, small_model, haiku_model, sonnet_model, opus_model, timeout_ms
  accounts:
    # Third-party accounts (format: provider@label)
    # Add your own: deepseek@work, kimi@personal, etc.
    proxy@private:
      model: kimi-k2.5
      small_model: small
      haiku_model: small
      sonnet_model: claude-sonnet
      opus_model: kimi-k2.5

  # ==========================================================================
  # Claude Code Plugins (downloaded via .chezmoiexternal.toml.tmpl)
  # All skills are hardcoded in .chezmoiexternal.toml.tmpl
  # ==========================================================================
